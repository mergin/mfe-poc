name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      - name: Run unit + e2e tests
        run: npm run test:ci

      - name: Upload Playwright JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: test-results/e2e-junit.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish Playwright test annotations
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: test-results/e2e-junit.xml
          check_name: Playwright E2E Report
          annotate_only: true
          fail_on_failure: false
          require_tests: false
          include_passed: false

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
